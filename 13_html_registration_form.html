<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
</head>
<body>
    <h2>Registration Form</h2>
    <form action="#" method="post">
        <label>Name:</label><br>
        <input type="text" placeholder="Enter Name"required><br><br>
       
        <label>Email:</label><br>
        <input type="email" placeholder="Enter Email"required><br><br>
        
        <label>Mobile:</label><br>
        <input type="tel" placeholder="Enter Mobile Number"required><br><br>
        
        <label>Password:</label><br>
        <input type="password" placeholder="Enter Password"required><br><br>
        
        <label> Confirm Password:</label><br>
        <input type="password" placeholder="Enter Confirm Password"required><br><br>
        
        <input type="submit" value="Register">
        <input type="reset" value="Reset">
        

    </form>

</body>
</html>
