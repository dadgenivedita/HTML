<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job application form</title>

</head>
<body>
    <h1 style="color:darkblue;text-align:center;">
    Job Application Form</h1>
    <form action="#" method="post">
    <fieldset>
        <legend><h2><b><u>Personal Details</u></b></h2></legend>
        <br>

        <label>Student Name:</label>
        <input type="text" required>
        <br><br>
        <label>Father'S Name:</label>
        <input type="text" required>
        <br><br>
        <label> Date of birth</label>
        <input type="date"required>
        <br><br>
        <label> Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>
        <label>Mobile Number:</label>
        <input type="tel"required><br><br>
        <label>Email:</label>
        <input type="email"required><br><br>
        <label>Marital Status:</label>
        <select>
            <option>Select</option>
            <option>Single</option>
            <option>Married</option>
            <option>unmarried</option>
        </select>
        <br><br>

     </fieldset>
        <br><br>

    <fieldset>
     <legend><h2><b><u>Educational Details</u></b></h2></legend>
        <br>
       
        <label>10th Percentage:</label>
        <input type="text"required>
        <br><br>
        <label>12th Percentage:</label>
        <input type="text"required>
        <br><br>
        <label>Graduation:</label>
        <input type="text"required>
        <br><br>
        <label>University:</label>
        <input type="text"required>
        <br><br>
        <label>Passing Year:</label>
        <input type="text"required>
        <br><br>
        <label>Additional Qualification:</label>
        <input type="text"required>
        <br><br>
    </fieldset>
    
        <br><br>

    <fieldset>
        <legend><h2><b><u>Experience Details</u></b></h2></legend>
        <br>
       
        <label>Total Experience:</label>
        <input type="text"required>
        <br><br>
        <label>Current Company:</label>
        <input type="text"required>
        <br><br>
        <label>Designation:</label>
        <input type="text"required>
        <br><br>
        <label>Current Salary:</label>
        <input type="text"required>
        <br><br>
        <label>skills:</label>
        <br>
        <textarea rows="4" cols="70"></textarea>
        <br><br>
    </fieldset>
    
        <br><br>

    <fieldset>
        <legend><h2><b><u>Address Details</u></b></h2></legend>
        <br>
        
        <label>Address:</label>
        <br>
        <textarea rows="5" cols="70"></textarea>
        <br><br>
        <label>City:</label>
        <input type="text"required>
        <br><br>
        <label>State:</label>
        <input type="text"required>
        <br><br>
        <label>Pin code:</label>
        <input type="text"required>
        <br><br>
        <label>Country:</label>
        <input type="text"required>
        <br><br>
    
    </fieldset>

        <br><br>

    <fieldset>
       <legend><h2><b><u>Photo & Signature</u></b></h2></legend>
       <br>
       
       <label>Upload Photo:</label>
       <input type="file"required>
       <br><br>
       <label>Upload Signature:</label>
       <input type="file"required>
       <br><br>
   
    </fieldset>

       <br><br>

       <legend><h2><b><u>Required Documents:</u></b></h2></legend>
       <br>
       <label>Resume/cv:</label>
       <input type="file"required>
       <br><br>
       <label>Aadhaar Card:</label>
       <input type="file"required>
       <br><br>
       <label>PAN Card:</label>
       <input type="file"required>
       <br><br>
       <label>10th Marksheet:</label>
       <input type="file"required>
       <br><br>
       <label>12th Marksheet:</label>
       <input type="file"required>
       <br><br>
       <label>Graduation Certificate:</label>
       <input type="file"required>
       <br><br>
       <label>Experience Certificate:</label>
       <input type="file"required>
       <br><br>
       <label>Other Documents:</label>
       <input type="file" multiple required>
       <br><br>

    
    <fieldset>
       <legend><h2><b><u>Declaration:</u></b></h2></legend>
       <br>
       <input type="checkbox"required>
       <label>I hereby declare that all the information provided above is true and correct to the best of my knowledge.</label>
       <br><br>

    </fieldset>
    
      <br><br>

       <input type="submit"value="Submit Application"
       style="background-color:green;color:white;padding:10px 20px;">
       <input type="reset"value="Reset Form"
       style="background-color:rgb(221, 85, 85);color:white;padding:10px 20px;">

    </fieldset>
    </form>

</body>
</html>
